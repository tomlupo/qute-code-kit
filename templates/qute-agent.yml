# qute-agent.yml
#
# Repo-level policy for qute-essentials when used together with Matt Pocock-style skills
# and Jimek declarative workflows.
#
# Intent:
# - Matt owns interactive engineering method: clarification, specs, ticket decomposition,
#   implementation discipline, TDD, code review.
# - qute owns local runtime: guards, observability, task-store operations, ADRs,
#   local review, tests/audits, release hygiene.
# - Jimek owns autonomous workflow orchestration when work is declared in jimek.yml
#   or jimek.yaml. GitHub PR/review operations are one verb family inside Jimek,
#   not Jimek's whole identity.
# - docs/agents owns repo-specific operating rules.

agentWorkflow:
  # matt | qute | jimek | custom
  # matt = interactive human-in-the-loop planning
  # jimek = declarative autonomous workflow from jimek.yml / jimek.yaml
  planningOwner: matt

  # github-issues | tasks-md | jimek | custom
  taskStore: github-issues

  # When planningOwner=matt, qute must not create a parallel generic spec/ticket flow.
  allowQuteSpecFlow: false
  allowQuteRoadmapFlow: false

  # Require repo-local operating rules when material work is being done.
  requireDocsAgents: true

qute:
  role: local-runtime
  owns:
    - guards
    - observability
    - task-store-operations
    - handoff-pickup
    - adr-writing
    - tests
    - audits
    - local-review
    - release
  doesNotOwn:
    - generic-planning
    - generic-spec-generation
    - generic-ticket-decomposition
    - architecture-planning
    - implementation-methodology
    - autonomous-workflow-orchestration
    - github-bot-identity-orchestration

matt:
  role: interactive-engineering-method
  owns:
    - grilling
    - domain-modeling
    - specs
    - tickets
    - implementation-loop
    - tdd
    - code-review
    - codebase-design

jimek:
  role: declarative-agentic-workflow-orchestrator
  configFiles:
    - jimek.yml
    - jimek.yaml
  owns:
    - workflow-graph
    - agent-assignment
    - dependency-ordering
    - parallel-work
    - run-status
    - multi-agent-handoff
    - github-pr-verbs
    - github-bot-identities
    - github-review-posting
    - review-gate-orchestration
  note: >-
    GitHub PR creation/review posting is a Jimek verb family used by agentic
    workflows. Jimek is not merely GitHub transport; it is the conductor for
    declared autonomous workflows.
