[project]
name = "my-quant-project"
version = "0.1.0"
description = ""
requires-python = ">=3.13"
dependencies = [
    # numeric / data
    "numpy>=2.3.2",
    "pandas>=2.3.1",
    "scipy>=1.10.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    # plotting
    "plotly>=5.15.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    # io / data formats
    "duckdb>=0.8.0",
    "pyarrow>=12.0.0",
    "openpyxl>=3.1.0",
    "tabulate>=0.9.0",
    "PyYAML>=6.0",
    # utilities
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "tqdm>=4.65.0",
    # experiment tracking
    "mlflow>=2.10.0",
    # notebooks
    "jupyter>=1.0.0",
    "ipykernel>=6.0.0",
    "notebook>=7.0.0",
]

# PEP 735 dependency groups — install with `uv sync` (includes dev by default).
[dependency-groups]
dev = [
    "pandas-stubs>=2.3.0.250703",
    "pyright>=1.1.403",
    "pytest>=8.4.1",
    "ruff>=0.12.9",
]

# Uncomment if you want to ship this project as an importable Python package
# (wheel). Most quant projects are applications and don't need this.
# [build-system]
# requires = ["hatchling"]
# build-backend = "hatchling.build"
# [tool.hatch.build.targets.wheel]
# packages = ["src"]

[tool.ruff]
line-length = 100
exclude = [".venv"]

[tool.ruff.lint]
select = ["E", "F", "UP", "I", "B", "Q", "SIM", "FLY", "PERF"]

[tool.pyright]
reportUnknownVariableType = true
reportUnknownMemberType = true
reportUnknownArgumentType = true
reportOptionalSubscript = true
reportUnusedImport = "error"
reportMissingTypeStubs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
