# qute PR-flow policy — the SINGLE SOURCE OF TRUTH for this repo's PR governance.
#
# Committed + tool-agnostic. BOTH surfaces read THIS file:
#   * CI  — .github/workflows/review-gate.yml (server-side gate: enforce? who reviews?)
#   * client — the qute-essentials hooks + the /qute-coder skill (open → review → assign).
#
# Copy this file to your repo as `.github/qute-pr.yml` and edit the values.
# Every key is optional; omit any and the documented default applies. A repo with
# NO qute-pr.yml behaves exactly as these defaults (nothing new fails).

# Who the /qute-coder chain assigns the PR to AND requests a review from.
assignTo: tomlupo

# Run the automatic independent review (qute-review[bot]) inside the /qute-coder chain.
independentReview: true

# May the agent merge its own PR? Default false → the agent must NOT merge; the PR
# is assigned to the human, who merges. Set true to let the agent `gh pr merge`
# AFTER a passing qute-review[bot] verdict exists.
allowAgentSelfMerge: false

# Turn on the blocking PR-flow enforcement (client merge/create guard hooks + the
# CI review-gate). Default false = OPT-IN / inert. Set true to enforce.
enforce: false
