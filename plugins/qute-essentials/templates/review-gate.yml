# review-gate — require an INDEPENDENT review object before a PR can merge.
#
# OPTIONAL, install-on-request. This is NOT auto-added to any repo. Install it
# into a repo that has opted into PR-flow enforcement with the one-liner in the
# qute-essentials README (or copy this file to .github/workflows/review-gate.yml).
#
# POLICY SOURCE: it reads the committed `.github/qute-pr.yml` (the single source of
# truth shared with the client hooks + /qute-coder skill). When `enforce: false`
# (the default, or the file is absent) the gate is a NO-OP green — it never fails a
# repo that hasn't opted in. When `enforce: true` it fails until a native review
# object authored by a DIFFERENT identity than the PR author exists — i.e. an
# independent reviewer (qute-review[bot] via /qute-reviewer, another App, or a
# human). A CI "comment" does NOT count; only a review object in state COMMENTED /
# APPROVED / CHANGES_REQUESTED does.
#
# This plan has no branch protection, so the check cannot HARD-block a merge — it
# turns a missing independent review into a visible RED check (the closing step is
# still on the agent). Enable branch protection requiring "review-gate" to hard-gate.
#
# ── SECOND JOB: audit-sensitive-paths (obsidian-vaults#167, Layer 2 "ON-PR") ──
# When a PR touches security-sensitive paths, run the deterministic qute-essentials
# `audit` verb: gitleaks (--secrets) is a HARD-FAIL (a leaked secret must block a
# merge); semgrep (--static) is ANNOTATE-ONLY (advisory, avoids false-positive merge
# blocks). Both are gated on the SAME `enforce` policy as the reviewer job — a repo
# that hasn't opted into PR-flow enforcement is a no-op green. The audit script is
# fetched from qute-code-kit at QUTE_AUDIT_REF (portable: CI runners don't carry the
# plugin). Jimek-onboarded repos inherit this by having the gate stamped in.
name: review-gate
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  pull-requests: read
  contents: read

jobs:
  require-independent-reviewer:
    runs-on: ubuntu-latest
    steps:
      # Read policy from the TRUSTED BASE branch, never the PR head — otherwise a
      # PR could set `enforce: false` (or delete the file) to disable the gate that
      # is meant to police it. base.sha is the base commit the PR targets.
      - name: Check out base-branch policy (trusted; not PR-controlled)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Require a review by a different identity than the author
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── read the shared policy: .github/qute-pr.yml ──
            // Dependency-free parse of the documented scalars in BOTH shapes: flat
            // top-level keys, and keys nested directly under `qutePrWorkflow:`. We
            // track nesting explicitly (rather than an indent-agnostic match) so an
            // `enforce:` nested under some OTHER key can never be picked up — keeping
            // this parser a faithful mirror of pr_flow_config.py (single source of truth).
            function readPolicy() {
              const policy = { enforce: false, assignTo: 'tomlupo' };
              function coerce(v) { return v.replace(/['"]/g, '').trim(); }
              for (const f of ['.github/qute-pr.yml', '.github/qute-pr.yaml']) {
                let text;
                try { text = fs.readFileSync(f, 'utf8'); } catch { continue; }
                let inWorkflow = false;
                for (const raw of text.split('\n')) {
                  const line = raw.replace(/#.*$/, '');
                  if (!line.trim()) continue;
                  const km = line.match(/^(\s*)([A-Za-z_][A-Za-z0-9_]*)\s*:\s*(.*?)\s*$/);
                  if (!km) continue;
                  const indent = km[1].length, key = km[2], val = km[3];
                  if (indent === 0) {
                    inWorkflow = (key === 'qutePrWorkflow' && val === '');
                  }
                  // accept the key at top level, or nested one level under qutePrWorkflow
                  const accept = (indent === 0) || inWorkflow;
                  if (!accept || val === '') continue;
                  if (key === 'enforce') policy.enforce = /^(true|yes|on)$/i.test(coerce(val));
                  else if (key === 'assignTo') policy.assignTo = coerce(val);
                }
                break;
              }
              return policy;
            }

            const policy = readPolicy();
            if (!policy.enforce) {
              core.info('qute-pr.yml enforce=false (or absent) — review-gate is a no-op. Passing.');
              return;
            }

            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const independent = reviews.filter(r =>
              r.user && r.user.login !== author &&
              ["COMMENTED", "APPROVED", "CHANGES_REQUESTED"].includes(r.state)
            );
            if (independent.length === 0) {
              core.setFailed(
                `No independent review yet (PR authored by @${author}). ` +
                `Post one with /qute-reviewer (qute-review[bot]) or have another identity review.`
              );
            } else {
              const who = [...new Set(independent.map(r => r.user.login))].join(", ");
              core.info(`Independent review present from: ${who}`);
            }

  # ── Layer 2: deterministic security audit on security-sensitive PRs ──────────
  audit-sensitive-paths:
    # Only on PR events (not on pull_request_review re-fires — nothing to re-scan).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      # Ref of tomlupo/qute-code-kit to fetch the self-contained `audit.py` from.
      # Pin to a tag/SHA in a hardened repo; `main` tracks the latest verb.
      QUTE_AUDIT_REF: main
    steps:
      - name: Check out PR head (full history for base-diff + trusted policy read)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate — enforce policy (trusted base) + sensitive-path filter
        id: gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Policy from the TRUSTED BASE commit, never the PR head (a PR must not be
          # able to disable the gate policing it). Coarse mirror of pr_flow_config.py:
          # match `enforce: true|yes|on` at top level or indented under qutePrWorkflow.
          policy="$(git show "$BASE_SHA:.github/qute-pr.yml" 2>/dev/null \
                 || git show "$BASE_SHA:.github/qute-pr.yaml" 2>/dev/null || true)"
          enforce=false
          if printf '%s\n' "$policy" | sed 's/#.*//' \
             | grep -iqE '^[[:space:]]*enforce[[:space:]]*:[[:space:]]*(true|yes|on)([[:space:]]|$)'; then
            enforce=true
          fi
          if [ "$enforce" != "true" ]; then
            echo "qute-pr.yml enforce=false (or absent) — audit gate is a no-op. Passing."
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # FAIL-CLOSED: if the changed-file set can't be computed (missing refs,
          # shallow clone, git error) a security gate must NOT silently skip — scan
          # the full tree instead of treating "unknown" as "nothing sensitive".
          if ! changed="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" 2>/dev/null)"; then
            echo "::warning title=Audit gate::could not compute changed files — running audit fail-closed (full-tree scan)."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"; printf '%s\n' "$changed"
          # Sensitive-path glob (obsidian-vaults#167 Q4, Tom-confirmed 2026-07-10):
          #   pyproject.toml · uv.lock · requirements*.txt · Dockerfile* · .env* ·
          #   .github/workflows/** · **/hooks/** · **/*.py
          if printf '%s\n' "$changed" | grep -qE \
             '(^|/)(pyproject\.toml|uv\.lock|requirements[^/]*\.txt|Dockerfile[^/]*|\.env[^/]*)$|^\.github/workflows/|(^|/)hooks/|\.py$'; then
            echo "Sensitive paths touched — audit will run."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No sensitive paths touched — skipping audit."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch the qute-essentials audit verb
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/tomlupo/qute-code-kit/${QUTE_AUDIT_REF}/plugins/qute-essentials/scripts/audit.py" \
            -o /tmp/audit.py
          test -s /tmp/audit.py

      - name: Install scanners (gitleaks + semgrep)
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
          python3 -m pip install --quiet semgrep
          semgrep --version

      - name: Secrets scan (gitleaks) — HARD FAIL
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          out="$(python3 /tmp/audit.py --secrets --no-deps --json)"; code=$?
          set -e
          printf '%s\n' "$out"
          findings="$(printf '%s' "$out" | python3 -c \
            'import json,sys; print(json.load(sys.stdin)["scanners"].get("secrets",{}).get("findings",0))' \
            2>/dev/null || echo '?')"
          if [ "$code" -ne 0 ]; then
            echo "::error title=Secret scan::gitleaks blocked this PR (exit $code, findings=$findings). A leaked secret or a failed scan must not merge — see the log above."
            exit 1
          fi
          echo "gitleaks: clean."

      - name: Static analysis (semgrep) — ANNOTATE ONLY
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          out="$(python3 /tmp/audit.py --static --no-deps --json)"; code=$?
          set -e
          printf '%s\n' "$out"
          findings="$(printf '%s' "$out" | python3 -c \
            'import json,sys; print(json.load(sys.stdin)["scanners"].get("static",{}).get("findings",0))' \
            2>/dev/null || echo 0)"
          if [ "${findings:-0}" != "0" ] && [ "${findings:-0}" != "?" ]; then
            echo "::warning title=Static analysis::semgrep flagged $findings finding(s) — advisory, not blocking. Review before merge."
          else
            echo "semgrep: no findings (or scanner unavailable) — advisory pass."
          fi
          # Annotate-only: never fail the job on static findings/errors.
          exit 0
