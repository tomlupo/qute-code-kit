# review-gate — require an INDEPENDENT review object before a PR can merge.
#
# OPTIONAL, install-on-request. This is NOT auto-added to any repo. Installing
# this file IS the opt-in — there is no separate policy file (ADR-0005 deleted
# `.github/qute-pr.yml`; merge/PR governance is `.claude/rules` for standalone
# repos, or the rigor tier in `conductor.yml` for jimek-managed repos).
#
# TIER-AWARE (ADR-0005 §4): the gate reads the PR's `jimek-tier:*` label,
# stamped by the jimek conductor (a trusted writer — labels are not PR-head
# content, so a PR can't stamp itself):
#   - `jimek-tier:trivial`          → PASS (no independent review by doctrine)
#   - `jimek-tier:standard|complex` → require an independent review object
#   - no label (standalone repo, or an interactive PR in a jimek repo)
#                                   → require an independent review object
# One template serves both governance modes.
#
# An independent review = a native review OBJECT (state COMMENTED / APPROVED /
# CHANGES_REQUESTED) authored by a DIFFERENT identity than the PR author —
# qute-review[bot] via /qute-reviewer, another App, or a human. A CI "comment"
# does NOT count. NOTE (ADR-0005): the identity check is the gate's *checkable*
# proxy; the substantive requirement is that a SEPARATE reviewing agent with
# fresh context reviewed the change.
#
# Without branch protection this check cannot HARD-block a merge — it turns a
# missing independent review into a visible RED check. Enable branch protection
# requiring "review-gate" to hard-gate.
#
# ── SECOND JOB: audit-sensitive-paths (obsidian-vaults#167, Layer 2 "ON-PR") ──
# When a PR touches security-sensitive paths, run the deterministic
# qute-essentials `audit` verb: gitleaks (--secrets) is a HARD-FAIL (a leaked
# secret must block a merge); semgrep (--static) is ANNOTATE-ONLY (advisory).
# Installing this workflow opts the repo into the audit job too. The audit
# script is fetched from qute-code-kit at QUTE_AUDIT_REF (portable: CI runners
# don't carry the plugin). /jimek-onboard renders its stamped review-gate.yml
# FROM this file (only substituting the branch trigger on top — see
# jimek_onboard.render_review_gate_yml), so onboarded repos inherit both jobs.
name: review-gate
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  pull-requests: read
  contents: read

jobs:
  require-independent-reviewer:
    runs-on: ubuntu-latest
    steps:
      - name: Require a review by a different identity than the author (tier-aware)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // ── tier awareness (Jimek rigor doctrine, ADR-0005 §4) ──
            // The `jimek-tier:*` label carries the conductor's rigor tier. The
            // `trivial` tier requires NO independent review by doctrine
            // (auto-merge on green CI). standard / complex — and NO label (a
            // standalone repo or an interactive PR) — require a review. The
            // label is set by the conductor (a trusted writer), not by PR-head
            // content, so it can't be spoofed to downgrade a change.
            const tierLabels = (pr.labels || []).map(l => l.name).filter(n => n.startsWith('jimek-tier:'));
            if (tierLabels.includes('jimek-tier:trivial')) {
              core.info('jimek-tier:trivial — no independent review required by doctrine. Passing.');
              return;
            }
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const independent = reviews.filter(r =>
              r.user && r.user.login !== author &&
              ["COMMENTED", "APPROVED", "CHANGES_REQUESTED"].includes(r.state)
            );
            if (independent.length === 0) {
              core.setFailed(
                `No independent review yet (PR authored by @${author}). ` +
                `Post one with /qute-reviewer (qute-review[bot]) or have another identity review.`
              );
            } else {
              const who = [...new Set(independent.map(r => r.user.login))].join(", ");
              core.info(`Independent review present from: ${who}`);
            }

  # ── Layer 2: deterministic security audit on security-sensitive PRs ──────────
  audit-sensitive-paths:
    # Only on PR events (not on pull_request_review re-fires — nothing to re-scan).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      # Ref of tomlupo/qute-code-kit to fetch the self-contained `audit.py` from.
      # Pin to a tag/SHA in a hardened repo; `main` tracks the latest verb.
      QUTE_AUDIT_REF: main
    steps:
      - name: Check out PR head (full history for base-diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate — sensitive-path filter
        id: gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Installing this workflow IS the opt-in (no policy file — ADR-0005).
          # FAIL-CLOSED: if the changed-file set can't be computed (missing refs,
          # shallow clone, git error) a security gate must NOT silently skip — scan
          # the full tree instead of treating "unknown" as "nothing sensitive".
          if ! changed="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" 2>/dev/null)"; then
            echo "::warning title=Audit gate::could not compute changed files — running audit fail-closed (full-tree scan)."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"; printf '%s\n' "$changed"
          # Sensitive-path glob (obsidian-vaults#167 Q4, Tom-confirmed 2026-07-10):
          #   pyproject.toml · uv.lock · requirements*.txt · Dockerfile* · .env* ·
          #   .github/workflows/** · **/hooks/** · **/*.py
          if printf '%s\n' "$changed" | grep -qE \
             '(^|/)(pyproject\.toml|uv\.lock|requirements[^/]*\.txt|Dockerfile[^/]*|\.env[^/]*)$|^\.github/workflows/|(^|/)hooks/|\.py$'; then
            echo "Sensitive paths touched — audit will run."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No sensitive paths touched — skipping audit."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch the qute-essentials audit verb
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/tomlupo/qute-code-kit/${QUTE_AUDIT_REF}/plugins/qute-essentials/scripts/audit.py" \
            -o /tmp/audit.py
          test -s /tmp/audit.py

      - name: Install scanners (gitleaks + semgrep)
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
          python3 -m pip install --quiet semgrep
          semgrep --version

      - name: Secrets scan (gitleaks) — HARD FAIL
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          out="$(python3 /tmp/audit.py --secrets --no-deps --json)"; code=$?
          set -e
          printf '%s\n' "$out"
          findings="$(printf '%s' "$out" | python3 -c \
            'import json,sys; print(json.load(sys.stdin)["scanners"].get("secrets",{}).get("findings",0))' \
            2>/dev/null || echo '?')"
          if [ "$code" -ne 0 ]; then
            echo "::error title=Secret scan::gitleaks blocked this PR (exit $code, findings=$findings). A leaked secret or a failed scan must not merge — see the log above."
            exit 1
          fi
          echo "gitleaks: clean."

      - name: Static analysis (semgrep) — ANNOTATE ONLY
        if: steps.gate.outputs.run == 'true'
        run: |
          set +e
          out="$(python3 /tmp/audit.py --static --no-deps --json)"; code=$?
          set -e
          printf '%s\n' "$out"
          findings="$(printf '%s' "$out" | python3 -c \
            'import json,sys; print(json.load(sys.stdin)["scanners"].get("static",{}).get("findings",0))' \
            2>/dev/null || echo 0)"
          if [ "${findings:-0}" != "0" ] && [ "${findings:-0}" != "?" ]; then
            echo "::warning title=Static analysis::semgrep flagged $findings finding(s) — advisory, not blocking. Review before merge."
          else
            echo "semgrep: no findings (or scanner unavailable) — advisory pass."
          fi
          # Annotate-only: never fail the job on static findings/errors.
          exit 0
