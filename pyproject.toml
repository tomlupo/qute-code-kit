# This repo is a Claude Code plugin marketplace, not a Python package.
# `pyproject.toml` exists only so `commitizen` (and by extension the
# `/ship` command) can atomically bump the version across both the
# marketplace manifest and each plugin's `plugin.json`.

[tool.commitizen]
name = "cz_conventional_commits"
version = "3.5.0"
version_files = [
    ".claude-plugin/marketplace.json:version",
    "plugins/qute-essentials/.claude-plugin/plugin.json:version",
]
update_changelog_on_bump = true
tag_format = "v$version"
major_version_zero = false

[tool.ruff.lint]
# Pin an explicit, conservative rule set. Without this, `uvx ruff` follows the
# floating ruff version's defaults, which drift and flip rules on/off across
# releases (that broke the CI gate). Core correctness (E/F) + import order (I);
# the plugin's hooks deliberately use blind-except / subprocess-without-check to
# never break the tool chain, so we don't enforce those style opinions here.
select = ["E", "F", "I"]
# Line length is the formatter's job (`ruff format`); it intentionally leaves
# long strings/URLs/comments, so E501 on top is redundant noise.
ignore = ["E501"]
